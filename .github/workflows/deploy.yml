name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    steps:
      - name: Pull latest frontend
        run: |
          cd /opt/project/frontend
          git pull origin main

      - name: Build frontend
        run: |
          cd /opt/project/deployment
          docker compose up -d --build frontend
